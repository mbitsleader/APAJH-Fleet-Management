version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: fleet_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fleet_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD doit être définie}
      POSTGRES_DB: ${POSTGRES_DB:-fleet_db}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - fleet_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fleet_user} -d ${POSTGRES_DB:-fleet_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  fleet_pgdata:
